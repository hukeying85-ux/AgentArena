schemaVersion: agentarena.taskpack/v1
id: efficiency-first-example
title: "Efficiency First Example (CursorBench Inspired)"
description: "Demonstrates token-efficiency judge for cost-effective coding"
metadata:
  i18n:
    zh-CN:
      title: "效率优先示例（CursorBench 风格）"
      description: "以 token 效率为核心评估编码代理"
  source: official
  owner: AgentArena
  difficulty: medium
  objective: "Complete the refactoring task within token budget"
  repoTypes: [node, typescript]
  tags: [efficiency-first, token-budget, cursorbench-inspired]
  judgeRationale: "Measures token efficiency as primary metric"
  differentiator: "Requires balancing quality with cost efficiency"
  interactionModel: "multi-turn"
  requirementClarity: "fuzzy"
  tokenBudget: 80000
prompt: |
  Refactor the authentication module to improve security.
  
  Requirements:
  - Update password hashing to use argon2
  - Add rate limiting to login endpoint  
  - Ensure backward compatibility with existing users
  
  Note: Try to complete this task efficiently - avoid unnecessary
  token usage while maintaining code quality.
judges:
  - type: command
    label: "All tests pass"
    command: |
      node -e "
        const {spawnSync}=require('node:child_process');
        for(const [cmd,args] of [
          ['npm',['test']],
          ['npm',['run','test']]
        ]){
          const r=spawnSync(cmd,args,{stdio:'inherit',shell:process.platform==='win32'});
          if(r.status===0) process.exit(0);
        }
        process.exit(1);
      "
    critical: true
    timeoutMs: 90000
  - type: token-efficiency
    label: "Token efficiency within budget"
    tokenBudget: 80000
    weight: 1.0
    critical: false
  - type: lint-check
    label: "Code quality check"
    command: "npm run lint -- --format json"
    format: eslint
    critical: false
    maxWarnings: 5
envAllowList:
  - NODE_ENV
  - CI
setupCommands: []
teardownCommands: []
