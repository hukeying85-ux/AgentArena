schemaVersion: agentarena.taskpack/v1
id: test-coverage
title: Increase Test Coverage
description: Add tests for untested modules.
metadata:
  source: official
  owner: AgentArena
  difficulty: easy
  objective: Write meaningful tests for validator.js and logger.js.
  judgeRationale: Behavioral tests verify test files actually run and pass.
  repoTypes: ["node"]
  tags: ["testing", "coverage"]
  dependencies: []
  differentiator: Good agents write tests that catch real bugs; weak agents write empty tests.

repoSource: "builtin://nodejs-app"

prompt: |
  ## Task | 任务

  `src/validator.js` and `src/logger.js` have NO tests. Add them:

  1. Create `test/validator.test.js` with tests for `requireString` and `requireNumber`:
     - Happy path: valid inputs return expected values
     - Error cases: wrong type, empty string, out of range
     - At least 5 test cases

  2. Create `test/logger.test.js` with tests for `createLogger`:
     - Test that createLogger returns an object with a log method
     - Test that log output includes the prefix
     - At least 3 test cases

  3. All tests must use `node:test` and `node:assert/strict`
  4. All tests must pass with `node --test`

  ## Constraints | 约束

  - Do NOT modify existing test files
  - Do NOT add new dependencies
  - Tests must actually test the code (not just assert true)

expectedChangedPaths:
  - test/validator.test.js
  - test/logger.test.js

envAllowList: []
setupCommands: []
teardownCommands: []
judges:
  - id: validator-tests-run
    type: command
    label: Validator tests run and pass
    command: node --test test/validator.test.js
    timeoutMs: 30000
    critical: true
  - id: logger-tests-run
    type: command
    label: Logger tests run and pass
    command: node --test test/logger.test.js
    timeoutMs: 30000
    critical: true
  - id: validator-test-has-assertions
    type: command
    label: Validator test has real assertions
    command: |
      node -e "var c=require('node:fs').readFileSync('test/validator.test.js','utf8');if(!c.includes('assert')){console.error('No assertions found');process.exit(1)}var count=(c.match(/assert\./g)||[]).length;if(count<3){console.error('Too few assertions: '+count);process.exit(1)}console.log('PASS: '+count+' assertions');"
    timeoutMs: 10000
