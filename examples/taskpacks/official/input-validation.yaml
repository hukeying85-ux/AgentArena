schemaVersion: agentarena.taskpack/v1
id: input-validation
title: Add Input Validation
description: Add HTML sanitization and path traversal protection.
metadata:
  source: official
  owner: AgentArena
  difficulty: medium
  objective: Add security-critical sanitization functions.
  judgeRationale: Behavioral tests verify XSS payloads are escaped and path traversal is blocked.
  repoTypes: ["node"]
  tags: ["validation", "security"]
  dependencies: []
  differentiator: Good agents implement real sanitization; weak agents add comments.

repoSource: "builtin://nodejs-app"

prompt: |
  ## Task | 任务

  Edit `src/validator.js` to add two security functions:

  1. `sanitizeHtml(input)` — escapes dangerous HTML characters:
     - `<` → `&lt;`
     - `>` → `&gt;`
     - `"` → `&quot;`
     - `'` → `&#x27;`
     - `&` → `&amp;`
     - Throws if input is not a string
     - Safe text (no special chars) must pass through unchanged

  2. `safePath(input)` — validates file paths:
     - Rejects paths containing `..`
     - Rejects absolute paths (starting with `/` or `C:\`)
     - Throws if input is not a string
     - Returns the cleaned path on success

  3. Export both functions from `src/index.js`

  ## Constraints | 约束

  - Only modify `src/validator.js` and `src/index.js`
  - Do NOT add new dependencies
  - Functions must actually work (not just exist as stubs)

expectedChangedPaths:
  - src/validator.js
  - src/index.js

envAllowList: []
setupCommands: []
teardownCommands: []
judges:
  - id: sanitize-html-works
    type: command
    label: sanitizeHtml escapes dangerous characters
    command: |
      node -e "var v=require('./src/validator');var a=require('node:assert/strict');a.strictEqual(typeof v.sanitizeHtml,'function');a.ok(v.sanitizeHtml('<script>alert(1)</script>').includes('&lt;'),'escapes <');a.ok(v.sanitizeHtml('<script>alert(1)</script>').includes('&gt;'),'escapes >');a.ok(!v.sanitizeHtml('<script>alert(1)</script>').includes('<script>'),'no raw script');a.strictEqual(v.sanitizeHtml('hello world'),'hello world','safe unchanged');a.ok(v.sanitizeHtml('a&b').includes('&amp;'),'escapes &');console.log('PASS: sanitizeHtml works');"
    timeoutMs: 10000
    critical: true
  - id: safe-path-works
    type: command
    label: safePath blocks path traversal
    command: |
      node -e "var v=require('./src/validator');var a=require('node:assert/strict');a.strictEqual(typeof v.safePath,'function');a.throws(function(){v.safePath('../etc/passwd')},'dot-dot');a.throws(function(){v.safePath('/etc/passwd')},'absolute unix');a.throws(function(){v.safePath('C:\\\\Windows')},'absolute windows');a.strictEqual(v.safePath('src/utils.js'),'src/utils.js','valid path');console.log('PASS: safePath works');"
    timeoutMs: 10000
    critical: true
  - id: exported
    type: command
    label: Functions exported from index
    command: |
      node -e "var m=require('./src/index');var a=require('node:assert/strict');a.strictEqual(typeof m.sanitizeHtml,'function');a.strictEqual(typeof m.safePath,'function');console.log('PASS: exported');"
    timeoutMs: 10000
