schemaVersion: agentarena.taskpack/v1
id: add-feature-with-tests
title: Add Feature with Tests
description: Add a memoization feature to a function and write tests for it.
metadata:
  source: official
  owner: AgentArena
  difficulty: hard
  objective: Test ability to add a feature, write tests, and verify everything works.
  judgeRationale: Behavioral tests verify the feature works correctly and tests pass.
  repoTypes: ["node"]
  tags: ["feature", "testing", "implementation"]
  dependencies: []
  differentiator: Tests end-to-end implementation — weak agents add code but don't test it.

repoSource: "builtin://nodejs-app"

prompt: |
  ## Task | 任务

  Add a `memoize` function to `src/utils.js` that caches function results:

  1. Add `memoize(fn)` to `src/utils.js`:
     - Returns a new function that caches results based on the first argument
     - If called with the same first argument again, returns the cached result
     - The cached function must have a `cache` property that exposes the cache object
     - The cache object must have `size()` and `clear()` methods

  2. Create `test/memoize.test.js` with at least 5 test cases:
     - Test that memoize returns the correct result
     - Test that repeated calls with the same argument use the cache
     - Test that `cache.size()` reports the correct count
     - Test that `cache.clear()` empties the cache
     - Test that different arguments produce different results

  3. Export `memoize` from `src/index.js`

  4. All tests must pass: `node --test test/memoize.test.js`

  ## Constraints | 约束

  - Only modify `src/utils.js` and `src/index.js`
  - Create `test/memoize.test.js` (new file)
  - Do NOT modify existing test files
  - Do NOT add new dependencies
  - The memoize function must be generic (work with any function)

expectedChangedPaths:
  - src/utils.js
  - src/index.js
  - test/memoize.test.js

envAllowList: []
setupCommands: []
teardownCommands: []
judges:
  - id: memoize-works
    type: command
    label: memoize function works correctly
    command: |
      node -e "var u=require('./src/utils');var a=require('node:assert/strict');a.strictEqual(typeof u.memoize,'function');var callCount=0;var fn=u.memoize(function(x){callCount++;return x*2});a.strictEqual(fn(5),10);a.strictEqual(fn(5),10);a.strictEqual(callCount,1);console.log('PASS: memoize works');"
    timeoutMs: 10000
    critical: true
  - id: cache-exposed
    type: command
    label: memoize exposes cache with size and clear
    command: |
      node -e "var u=require('./src/utils');var a=require('node:assert/strict');var fn=u.memoize(function(x){return x});fn(1);fn(2);a.strictEqual(typeof fn.cache,'object');a.strictEqual(typeof fn.cache.size,'function');a.strictEqual(typeof fn.cache.clear,'function');a.strictEqual(fn.cache.size(),2);fn.cache.clear();a.strictEqual(fn.cache.size(),0);console.log('PASS: cache exposed');"
    timeoutMs: 10000
    critical: true
  - id: tests-pass
    type: command
    label: memoize tests pass
    command: node --test test/memoize.test.js
    timeoutMs: 30000
    critical: true
  - id: exported
    type: command
    label: memoize exported from index
    command: |
      node -e "var m=require('./src/index');var a=require('node:assert/strict');a.strictEqual(typeof m.memoize,'function');console.log('PASS: exported');"
    timeoutMs: 10000
