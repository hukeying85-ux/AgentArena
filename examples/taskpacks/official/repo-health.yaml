schemaVersion: agentarena.taskpack/v1
id: official-repo-health
title: Official Repo Health
description: Fix a bug in a utility function and verify existing tests pass.
metadata:
  source: official
  owner: AgentArena
  difficulty: easy
  objective: Check that an agent can fix a simple bug without breaking existing functionality.
  repoTypes: ["node"]
  tags: ["bugfix", "maintenance"]
  dependencies: []
  judgeRationale: Behavioral tests verify the bug is fixed and other functions still work.
  differentiator: Baseline test - all competent agents should pass.
  i18n:
    zh-CN:
      title: 仓库健康检查
      description: 修复工具函数中的 bug 并验证现有测试通过。
      objective: 检查 Agent 能否在不破坏现有功能的情况下修复简单 bug。
      judgeRationale: 行为测试验证 bug 已修复且其他函数仍正常工作。

repoSource: "builtin://nodejs-app"

prompt: |
  ## Task | 任务

  The `capitalize` function in `src/utils.js` has a bug: it only capitalizes the first
  character of the entire string, not the first character of each word.

  For example: `capitalize("hello world")` returns `"Hello world"` instead of `"Hello World"`.

  Fix the function so it capitalizes the first letter of EVERY word.

  ## Constraints | 约束

  - Only modify `src/utils.js`
  - Do NOT delete or rename any existing functions
  - Do NOT add new dependencies
  - The fix must handle: empty string, single word, multiple words, multiple spaces

expectedChangedPaths:
  - src/utils.js

envAllowList: []
setupCommands: []
teardownCommands: []
judges:
  - id: capitalize-works
    type: command
    label: capitalize correctly capitalizes every word
    command: |
      node -e "var u=require('./src/utils');var a=require('node:assert/strict');a.strictEqual(u.capitalize('hello world'),'Hello World','multi-word');a.strictEqual(u.capitalize('single'),'Single','single word');a.strictEqual(u.capitalize(''),'','empty');a.strictEqual(u.capitalize('a b c'),'A B C','three words');console.log('PASS: capitalize works');"
    timeoutMs: 10000
    critical: true
  - id: other-functions-preserved
    type: command
    label: Other functions still work
    command: |
      node -e "var u=require('./src/utils');var a=require('node:assert/strict');a.strictEqual(u.reverse('hello'),'olleh');a.strictEqual(u.slugify('Hello World!'),'hello-world');a.strictEqual(u.truncate('Long text',4),'Long...');console.log('PASS: other functions preserved');"
    timeoutMs: 10000
    critical: true
  - id: tests-pass
    type: command
    label: All tests pass
    command: node --test test/utils.test.js
    timeoutMs: 30000
    critical: true
