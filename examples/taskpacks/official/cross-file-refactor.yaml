schemaVersion: agentarena.taskpack/v1
id: cross-file-refactor
title: Cross-File Refactor
description: Move a function to a new module and update all references.
metadata:
  source: official
  owner: AgentArena
  difficulty: hard
  objective: Test multi-file coordination and import management.
  judgeRationale: Behavioral tests verify the function works in its new location and all references are updated.
  repoTypes: ["node"]
  tags: ["refactor", "multi-file", "coordination"]
  dependencies: []
  differentiator: Tests multi-file coordination — weak agents miss references or break imports.

repoSource: "builtin://nodejs-app"

prompt: |
  ## Task | 任务

  The `slugify` function in `src/utils.js` should be moved to a new file `src/slugify.js`
  because it's a self-contained utility used by multiple modules.

  Steps:
  1. Create `src/slugify.js` — move the `slugify` function there, export it
  2. Edit `src/utils.js` — remove `slugify`, import it from `./slugify.js` and re-export it
     so existing consumers (`require("./utils").slugify`) still work
  3. Edit `src/index.js` — make sure `slugify` is still exported
  4. Run `node --test test/*.test.js` to verify ALL tests pass
  5. If any test fails, fix the issue and run tests again
  6. Repeat until ALL tests pass

  IMPORTANT: The test suite checks ALL functions in utils.js, not just slugify.
  Make sure your changes don't break `capitalize`, `reverse`, `truncate`, `memoize`, etc.

  ## Constraints | 约束

  - `require("./utils").slugify` must still work (backward compatible)
  - `require("./slugify").slugify` must also work
  - All existing tests must pass — run `node --test test/*.test.js` to verify
  - Do NOT add new dependencies

expectedChangedPaths:
  - src/slugify.js
  - src/utils.js
  - src/index.js

envAllowList: []
setupCommands: []
teardownCommands: []
judges:
  - id: slugify-in-new-file
    type: command
    label: slugify works from new file
    command: |
      node -e "var m=require('./src/slugify');var a=require('node:assert/strict');a.strictEqual(typeof m.slugify,'function');a.strictEqual(m.slugify('Hello World!'),'hello-world');console.log('PASS: slugify in new file');"
    timeoutMs: 10000
    critical: true
  - id: slugify-backward-compatible
    type: command
    label: slugify still works from utils
    command: |
      node -e "var m=require('./src/utils');var a=require('node:assert/strict');a.strictEqual(typeof m.slugify,'function');a.strictEqual(m.slugify('Hello World!'),'hello-world');console.log('PASS: backward compatible');"
    timeoutMs: 10000
    critical: true
  - id: utils-tests-pass
    type: command
    label: Utils tests pass
    command: node --test test/utils.test.js
    timeoutMs: 30000
    critical: true
  - id: no-duplicate-code
    type: command
    label: slugify not duplicated in utils.js
    command: |
      node -e "var c=require('node:fs').readFileSync('src/utils.js','utf8');if(c.indexOf('function slugify')!==-1){console.error('slugify function still in utils.js');process.exit(1)}console.log('PASS: no duplicate');"
    timeoutMs: 10000
