schemaVersion: agentarena.taskpack/v1
id: error-handling
title: Create Error Classes
description: Create custom error class hierarchy and add input validation.
metadata:
  source: official
  owner: AgentArena
  difficulty: medium
  objective: Create error class hierarchy and add input validation.
  judgeRationale: Behavioral tests verify error classes work and validation rejects bad input.
  repoTypes: ["node"]
  tags: ["error-handling", "validation"]
  dependencies: []
  differentiator: Good agents create proper error classes with correct behavior; weak agents skip validation.

repoSource: "builtin://nodejs-app"

prompt: |
  ## Task | ð££ÍÀ

  1. Edit `src/errors.js` and create these error classes:
     - `AppError` extends `Error` ã has `code` (string) and `statusCode` (number)
     - `ValidationError` extends `AppError` ã statusCode 400
     - `NotFoundError` extends `AppError` ã statusCode 404
     - `AuthenticationError` extends `AppError` ã statusCode 401
     - Export all of them

  2. Edit `src/validator.js`:
     - Import `ValidationError` from `./errors.js`
     - Update `requireString` to throw `ValidationError` (not generic `Error`)
     - Add a `sanitizeString(input)` function that escapes `<` to `&lt;`, `>` to `&gt;`, `&` to `&amp;`
     - Export `sanitizeString`

  3. Edit `src/index.js` to export the new error classes

  ## Constraints | Ó¤ÎÌ

  - Do NOT add new dependencies
  - Error classes must be real classes (not just objects)
  - Error messages must be descriptive

expectedChangedPaths:
  - src/errors.js
  - src/validator.js
  - src/index.js

envAllowList: []
setupCommands: []
teardownCommands: []
judges:
  - id: error-classes-work
    type: command
    label: Error classes work correctly
    command: |
      node -e "var m=require('./src/errors');var a=require('node:assert/strict');a.strictEqual(typeof m.AppError,'function','AppError');a.strictEqual(typeof m.ValidationError,'function','ValidationError');a.strictEqual(typeof m.NotFoundError,'function','NotFoundError');a.strictEqual(typeof m.AuthenticationError,'function','AuthenticationError');var e=new m.AppError('test','TEST',500);a.ok(e instanceof Error);a.strictEqual(e.code,'TEST');a.strictEqual(e.statusCode,500);var v=new m.ValidationError('bad');a.ok(v instanceof m.AppError);a.strictEqual(v.statusCode,400);console.log('PASS: error classes work');"
    timeoutMs: 10000
    critical: true
  - id: validation-rejects-bad-input
    type: command
    label: requireString throws ValidationError for empty input
    command: |
      node -e "var v=require('./src/validator');var m=require('./src/errors');var a=require('node:assert/strict');a.throws(function(){v.requireString('','test')},function(e){return e instanceof m.ValidationError},'empty string');a.throws(function(){v.requireString('  ','test')},function(e){return e instanceof m.ValidationError},'whitespace');a.strictEqual(v.requireString('hello','test'),'hello','valid');console.log('PASS: validation rejects bad input');"
    timeoutMs: 10000
    critical: true
  - id: sanitize-works
    type: command
    label: sanitizeString escapes HTML
    command: |
      node -e "var v=require('./src/validator');var a=require('node:assert/strict');a.strictEqual(typeof v.sanitizeString,'function');a.ok(v.sanitizeString('<script>').includes('&lt;'),'escapes <');a.ok(v.sanitizeString('&amp;').includes('&amp;'),'escapes &');a.strictEqual(v.sanitizeString('hello'),'hello','safe text unchanged');console.log('PASS: sanitizeString works');"
    timeoutMs: 10000
    critical: true
  - id: errors-exported
    type: command
    label: Error classes exported from index
    command: |
      node -e "var m=require('./src/index');var a=require('node:assert/strict');a.strictEqual(typeof m.AppError,'function');a.strictEqual(typeof m.ValidationError,'function');console.log('PASS: errors exported');"
    timeoutMs: 10000
