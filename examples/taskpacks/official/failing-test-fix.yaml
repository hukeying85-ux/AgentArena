schemaVersion: agentarena.taskpack/v1
id: failing-test-fix
title: Failing Test Fix
description: Fix a failing test by correcting the implementation.
metadata:
  source: official
  owner: AgentArena
  difficulty: medium
  objective: Test ability to diagnose and fix test failures.
  judgeRationale: The agent must run tests, read failures, and fix the implementation.
  repoTypes: ["node"]
  tags: ["bugfix", "testing", "debugging"]
  dependencies: []
  differentiator: Tests iterative debugging — good harnesses run tests and iterate.

repoSource: "builtin://nodejs-app"

prompt: |
  ## Task | 任务

  There is a failing test. Fix the implementation to make it pass.

  1. Run `node --test test/calculator.test.js` to see which tests fail
  2. Read the failing test to understand what's expected
  3. Read `src/calculator.js` to find the bug
  4. Fix the bug (only change the buggy line, don't rewrite the function)
  5. Run tests again to verify ALL pass

  ## Constraints | 约束

  - Only modify `src/calculator.js`
  - Do NOT modify test files
  - Only fix the specific bug — don't change working functions
  - All tests must pass after your fix

expectedChangedPaths:
  - src/calculator.js

envAllowList: []
setupCommands: []
teardownCommands: []
judges:
  - id: subtract-fixed
    type: command
    label: subtract returns correct result
    command: |
      node -e "var c=require('./src/calculator');var a=require('node:assert/strict');a.strictEqual(c.subtract(5,3),2);a.strictEqual(c.subtract(10,10),0);console.log('PASS: subtract fixed');"
    timeoutMs: 10000
    critical: true
  - id: tests-pass
    type: command
    label: Calculator tests pass
    command: node --test test/calculator.test.js
    timeoutMs: 30000
    critical: true
