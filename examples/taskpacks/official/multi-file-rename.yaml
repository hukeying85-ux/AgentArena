schemaVersion: agentarena.taskpack/v1
id: multi-file-rename
title: Multi-File Rename
description: Rename a function across multiple source files.
metadata:
  source: official
  owner: AgentArena
  difficulty: medium
  objective: Test ability to coordinate changes across multiple files.
  judgeRationale: Behavioral tests verify the function is renamed everywhere and still works.
  repoTypes: ["node"]
  tags: ["refactor", "rename", "multi-file"]
  dependencies: []
  differentiator: Tests thoroughness — weak agents miss references.

repoSource: "builtin://nodejs-app"

prompt: |
  ## Task | 任务

  Rename the function `requireString` to `validateString` in the source files.

  Steps:
  1. Read `src/validator.js` — find the `requireString` function definition
  2. Rename it to `validateString`
  3. Read `src/index.js` — find the `requireString` export
  4. Update it to `validateString`
  5. Verify: `node -e "var v=require('./src/validator');console.log(v.validateString('hello','test'))"`

  ## Constraints | 约束

  - Only modify `src/validator.js` and `src/index.js`
  - Do NOT modify test files
  - The function behavior must remain identical

expectedChangedPaths:
  - src/validator.js
  - src/index.js

envAllowList: []
setupCommands: []
teardownCommands: []
judges:
  - id: old-name-gone
    type: command
    label: No references to requireString in source files
    command: |
      node -e "var fs=require('node:fs');var files=['src/validator.js','src/index.js'];var found=[];files.forEach(function(f){var c=fs.readFileSync(f,'utf8');if(c.includes('requireString'))found.push(f)});if(found.length>0){console.error('Still has requireString:',found.join(', '));process.exit(1)}console.log('PASS: no old references');"
    timeoutMs: 10000
    critical: true
  - id: new-name-works
    type: command
    label: validateString works correctly
    command: |
      node -e "var v=require('./src/validator');var a=require('node:assert/strict');a.strictEqual(typeof v.validateString,'function');a.strictEqual(v.validateString('hello','test'),'hello');a.throws(function(){v.validateString('','test')});console.log('PASS: validateString works');"
    timeoutMs: 10000
    critical: true
