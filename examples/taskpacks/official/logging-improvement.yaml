schemaVersion: agentarena.taskpack/v1
id: logging-improvement
title: Improve Logging
description: Add log levels and context support to the logger.
metadata:
  source: official
  owner: AgentArena
  difficulty: medium
  objective: Enhance the logger with levels, filtering, and context.
  judgeRationale: Behavioral tests verify logger has levels, filtering, and withContext.
  repoTypes: ["node"]
  tags: ["logging", "observability"]
  dependencies: []
  differentiator: Good agents create a working logger with real features; weak agents rename log to info.

repoSource: "builtin://nodejs-app"

prompt: |
  ## Task | 任务

  Edit `src/logger.js` to enhance the logger:

  1. The `createLogger(prefix)` function must return an object with these methods:
     - `debug(message)`, `info(message)`, `warn(message)`, `error(message)`
     - Each method prints `[LEVEL] [prefix] message` (e.g., `[INFO] [app] hello`)

  2. Add a configurable minimum level:
     - `createLogger(prefix, options)` where `options.level` is "debug"/"info"/"warn"/"error"
     - Default level is "info"
     - Messages below the minimum level must NOT be printed

  3. Add `withContext(context)` method:
     - Returns a new logger that includes the context fields in every message
     - The child logger must have all the same methods (debug, info, warn, error, withContext)

  4. Export from `src/index.js`

  ## Constraints | 约束

  - Only modify `src/logger.js` and `src/index.js`
  - Do NOT add new dependencies
  - Keep backward compatibility: `createLogger("app")` must still work

expectedChangedPaths:
  - src/logger.js
  - src/index.js

envAllowList: []
setupCommands: []
teardownCommands: []
judges:
  - id: logger-has-levels
    type: command
    label: Logger has all level methods
    command: |
      node -e "var m=require('./src/logger');var l=m.createLogger('test');var a=require('node:assert/strict');a.strictEqual(typeof l.debug,'function');a.strictEqual(typeof l.info,'function');a.strictEqual(typeof l.warn,'function');a.strictEqual(typeof l.error,'function');console.log('PASS: logger has levels');"
    timeoutMs: 10000
    critical: true
  - id: logger-has-context
    type: command
    label: Logger supports withContext
    command: |
      node -e "var m=require('./src/logger');var l=m.createLogger('test');var a=require('node:assert/strict');a.strictEqual(typeof l.withContext,'function');var child=l.withContext({req:'123'});a.strictEqual(typeof child.info,'function');a.strictEqual(typeof child.withContext,'function');console.log('PASS: logger has withContext');"
    timeoutMs: 10000
    critical: true
  - id: level-filtering
    type: command
    label: Logger filters by level
    command: |
      node -e "var m=require('./src/logger');var output=[];var orig=console.log;console.log=function(){output.push(Array.from(arguments).join(' '));orig.apply(console,arguments)};var l=m.createLogger('test',{level:'warn'});l.debug('no');l.info('no');l.warn('yes');l.error('yes');console.log=orig;var hasDebug=output.some(function(s){return s.includes('[DEBUG]')});var hasInfo=output.some(function(s){return s.includes('[INFO]')});var hasWarn=output.some(function(s){return s.includes('[WARN]')});var hasError=output.some(function(s){return s.includes('[ERROR]')});var a=require('node:assert/strict');a.strictEqual(hasDebug,false,'debug should be filtered');a.strictEqual(hasInfo,false,'info should be filtered');a.strictEqual(hasWarn,true,'warn should pass');a.strictEqual(hasError,true,'error should pass');console.log('PASS: level filtering works');"
    timeoutMs: 10000
    critical: true
  - id: exported
    type: command
    label: Logger exported from index
    command: |
      node -e "var m=require('./src/index');var a=require('node:assert/strict');a.strictEqual(typeof m.createLogger,'function');console.log('PASS: exported');"
    timeoutMs: 10000
