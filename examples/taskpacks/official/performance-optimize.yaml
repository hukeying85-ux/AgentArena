schemaVersion: agentarena.taskpack/v1
id: official-performance-optimize
title: Performance Optimize
description: Optimize utility functions for better performance.
metadata:
  source: official
  owner: AgentArena
  difficulty: hard
  objective: Optimize code while preserving correctness.
  judgeRationale: Behavioral tests verify optimized code still produces correct results.
  repoTypes: ["node"]
  tags: ["performance", "optimization"]
  dependencies: []
  differentiator: Good agents optimize with measurable improvements; weak agents break the code.
  i18n:
    zh-CN:
      title: 性能优化
      description: 优化工具函数以提升性能。
      objective: 在保持正确性的同时优化代码。
      judgeRationale: 行为测试验证优化后的代码仍产生正确结果。

repoSource: "builtin://nodejs-app"

prompt: |
  ## Task | 任务

  Optimize the utility functions in `src/utils.js` for better performance:

  1. `capitalize(str)`: If it uses string concatenation in a loop, use array.join()
  2. `slugify(str)`: If it calls replace() multiple times, combine into one regex
  3. `reverse(str)`: If it creates intermediate arrays, use a more efficient approach

  For each optimization, add a comment explaining WHY it's faster.

  ## Constraints | 约束

  - Only modify `src/utils.js`
  - All functions must produce EXACTLY the same output as before
  - All existing tests must still pass
  - Do NOT add new dependencies
  - Each optimization must have a comment explaining the rationale

expectedChangedPaths:
  - src/utils.js

envAllowList: []
setupCommands: []
teardownCommands: []
judges:
  - id: tests-still-pass
    type: command
    label: All tests still pass after optimization
    command: node --test test/utils.test.js
    timeoutMs: 30000
    critical: true
  - id: has-optimization-comments
    type: command
    label: Optimizations have explanatory comments
    command: |
      node -e "var c=require('node:fs').readFileSync('src/utils.js','utf8');var hasPerf=c.toLowerCase().includes('performance')||c.toLowerCase().includes('optimi')||c.toLowerCase().includes('faster')||c.toLowerCase().includes('efficient');if(!hasPerf){console.error('No optimization comments found');process.exit(1)}console.log('PASS: has optimization comments');"
    timeoutMs: 10000
  - id: output-unchanged
    type: command
    label: Functions produce same output
    command: |
      node -e "var u=require('./src/utils');var a=require('node:assert/strict');a.strictEqual(u.capitalize('hello world'),'Hello World');a.strictEqual(u.reverse('hello'),'olleh');a.strictEqual(u.slugify('Hello World!'),'hello-world');a.strictEqual(u.truncate('Hello',3),'Hel...');console.log('PASS: output unchanged');"
    timeoutMs: 10000
    critical: true
